<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graf pohybu</title>
  <style>
    :root {
      --axis: #1e6bb8;
      --grid: rgba(30, 107, 184, 0.22);
      --track: #111;
      --bg: #f4f7fb;
      --panel: #fff;
      --accent: #1e6bb8;
      --text: #1a1a1a;
      --muted: #5c6370;
      --handle: #1e6bb8;
      --square: #c8ccd4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
    }

    .graph-main-layout {
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 16px;
      row-gap: 0;
      align-items: start;
    }

    .graph-sidebar-buttons {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 7.75rem;
      align-self: start;
    }

    .graph-sidebar-buttons button {
      width: 100%;
      padding: 9px 12px;
    }

    .graph-sidebar-timer-wrap {
      grid-column: 1;
      grid-row: 4;
      width: 7.75rem;
      align-self: start;
      margin-top: 20px;
    }

    .graph-sidebar-timer-wrap .timer {
      display: block;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .graph-main-layout > h1 {
      grid-column: 2;
      grid-row: 1;
      margin: 0 0 16px;
    }

    .graph-main-layout > .chart-wrap {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
    }

    .graph-axis-y-bar {
      grid-column: 2;
      grid-row: 3;
      min-width: 0;
      margin-top: 14px;
      padding: 10px 14px;
      background: var(--panel);
      border-radius: 8px;
      border: 1px solid #dde3ec;
    }

    .graph-axis-y-bar .graph-target-wrap {
      margin-left: 0;
      padding-left: 0;
      border-left: none;
    }

    .graph-main-layout > .track-section {
      grid-column: 2;
      grid-row: 4;
      min-width: 0;
    }

    @media (max-width: 560px) {
      .graph-main-layout {
        grid-template-columns: 1fr;
      }

      .graph-sidebar-buttons {
        grid-column: 1;
        grid-row: 2;
        flex-direction: row;
        flex-wrap: wrap;
        width: 100%;
      }

      .graph-sidebar-buttons button {
        width: auto;
        flex: 1 1 auto;
        min-width: min(100%, 7rem);
      }

      .graph-axis-y-bar {
        grid-column: 1;
        grid-row: 4;
        margin-top: 12px;
      }

      .graph-sidebar-timer-wrap {
        grid-column: 1;
        grid-row: 5;
        width: 100%;
        max-width: 12rem;
        align-self: center;
        margin-top: 0;
      }

      .graph-main-layout > h1 {
        grid-column: 1;
        grid-row: 1;
      }

      .graph-main-layout > .chart-wrap {
        grid-column: 1;
        grid-row: 3;
      }

      .graph-main-layout > .track-section {
        grid-column: 1;
        grid-row: 6;
      }
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .chart-wrap {
      background: var(--panel);
      border-radius: 8px;
      padding: 16px 16px 8px;
      border: 1px solid #dde3ec;
    }

    .chart-svg {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .chart-svg text {
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }

    .track-section {
      margin-top: 20px;
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #dde3ec;
      overflow: hidden;
    }

    /**
     * ViewBox má horní rezervu (záporné min-y), aby nebyla ořezaná hlava SVG cyklisty.
     */
    .track-section > .track-svg {
      display: block;
      width: 100%;
      margin-left: 0;
      margin-right: 0;
      height: auto;
      max-width: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .track-section > .track-svg text {
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }

    .track-section .cyclist-jet {
      animation: cyclist-jet-pulse 0.14s ease-in-out infinite;
    }

    @keyframes cyclist-jet-pulse {
      0%,
      100% {
        opacity: 1;
      }
      45% {
        opacity: 0.76;
      }
      72% {
        opacity: 0.93;
      }
    }

    .controls {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .controls-buttons {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
    }

    .dual-graph-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      flex-shrink: 0;
    }

    .graph-target-wrap.graph-target-under-dual {
      margin-left: 0;
      padding-left: 22px;
      border-left: none;
    }

    .graph-target-wrap[hidden] {
      display: none !important;
    }

    button {
      font: inherit;
      padding: 10px 22px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.05);
    }

    button.secondary {
      background: var(--panel);
      color: var(--accent);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
    }

    .timer {
      font-variant-numeric: tabular-nums;
      font-size: 1.25rem;
      letter-spacing: 0.06em;
      padding: 10px 18px;
      border-radius: 6px;
      border: 1px solid #dde3ec;
      background: #fafbfd;
      min-width: 120px;
      text-align: center;
    }

    .dual-check,
    .graph-target-wrap label {
      font-size: 0.875rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .dual-check input,
    .graph-target-wrap input {
      margin-right: 6px;
      vertical-align: middle;
    }

    .graph-target-wrap {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      margin-left: 4px;
      padding-left: 14px;
      border-left: 1px solid #dde3ec;
    }

    .graph-target-wrap input:disabled {
      cursor: not-allowed;
    }

    .help-dialog {
      max-width: min(520px, calc(100vw - 48px));
      padding: 0;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.14);
    }

    .help-dialog::backdrop {
      background: rgba(26, 26, 26, 0.35);
    }

    .help-dialog-inner {
      padding: 20px 22px 22px;
    }

    .help-dialog-inner h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .help-dialog-inner p {
      margin: 0 0 18px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .help-dialog-inner > button {
      margin-top: 16px;
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="graph-main-layout">
      <div class="graph-sidebar-buttons" aria-label="Akce">
        <button type="button" id="btnRun">Spustit</button>
        <button type="button" id="btnReset" class="secondary">Reset</button>
        <button type="button" id="btnHelp" class="secondary">Nápověda</button>
      </div>
      <div class="graph-sidebar-timer-wrap" aria-label="Časomíra">
        <span class="timer" id="timer" aria-live="polite">00 : 00</span>
      </div>
      <h1>Graf pohybu</h1>
      <div class="chart-wrap">
        <svg id="chart" class="chart-svg" viewBox="0 0 648 340" aria-label="Graf vzdálenost–čas"></svg>
      </div>

      <div class="graph-axis-y-bar">
        <span class="graph-target-wrap axis-y-wrap">
          <span class="graph-target-label">Osa Y</span>
          <label><input type="radio" name="axisY" value="start" checked /> Vzdálenost od startu</label>
          <label><input type="radio" name="axisY" value="cumulative" /> Celkově ujetá vzdálenost</label>
          <label><input type="radio" name="axisY" value="velocity" /> Rychlost</label>
        </span>
      </div>

      <div class="track-section">
        <svg id="track" class="track-svg" viewBox="0 -18 648 114" preserveAspectRatio="xMidYMid meet" aria-label="Dráha"></svg>
      </div>
    </div>

    <div class="controls">
      <div class="controls-buttons">
        <div class="dual-graph-block">
          <label class="dual-check">
            <input type="checkbox" id="chkDualGraph" />
            Dva cyklisti
          </label>
          <span id="graphTargetWrap" class="graph-target-wrap graph-target-under-dual" hidden>
            <span class="graph-target-label">Upravovat</span>
            <label><input type="radio" name="graphTarget" value="1" checked disabled /> graf 1</label>
            <label><input type="radio" name="graphTarget" value="2" disabled /> graf 2</label>
          </span>
        </div>
      </div>
    </div>
  </div>

  <dialog id="helpDialog" class="help-dialog" aria-labelledby="helpDialogTitle">
    <div class="help-dialog-inner">
      <h2 id="helpDialogTitle">Tvorba grafu</h2>
      <p>
        Kliknutím přidej bod grafu. Body je možné posunovat. Dvojklikem bod zrušíš.
        U čar mřížky se bod jemně přitahuje; dál od nich lze zadat hodnotu i mezi dílky.
      </p>
      <button type="button" id="helpDialogClose" class="secondary">Zavřít</button>
    </div>
  </dialog>

  <script>
(function () {
  const T_MAX = 12;
  const S_MAX = 8;
  /** Na svislé ose v režimu „Rychlost“: jeden dílek mřížky = tolik m/s (horní dílek = S_MAX × toto). */
  const VELOCITY_AXIS_MPS_PER_DIV = 2;
  /** Jedna dílka na vodorovné časové ose [s] */
  const TIME_AXIS_STEP = 1;

  /** Tolerance přitahu k čáře mřížky ve viewBox souřadnicích grafu (mimo ni lze vložit libovolně). */
  const CHART_GRID_SNAP_PX = 7;

  function velocityGraphMaxMps() {
    return S_MAX * VELOCITY_AXIS_MPS_PER_DIV;
  }

  const chartEl = document.getElementById("chart");
  const trackEl = document.getElementById("track");
  const btnRun = document.getElementById("btnRun");
  const btnReset = document.getElementById("btnReset");
  const btnHelp = document.getElementById("btnHelp");
  const chkDualGraph = document.getElementById("chkDualGraph");
  const graphTargetWrap = document.getElementById("graphTargetWrap");
  const helpDialog = document.getElementById("helpDialog");
  const helpDialogClose = document.getElementById("helpDialogClose");
  const timerEl = document.getElementById("timer");

  /** Plot margins inside SVG viewBox */
  const ml = 78;
  const mr = 28;
  const mt = 28;
  const mb = 44;
  const W = 648;
  const H = 340;
  const pw = W - ml - mr;
  const ph = H - mt - mb;

  function tToX(t) {
    return ml + (t / T_MAX) * pw;
  }

  function sToY(s) {
    return mt + ph - (s / S_MAX) * ph;
  }

  function xToT(x) {
    const t = ((x - ml) / pw) * T_MAX;
    return Math.min(T_MAX, Math.max(0, t));
  }

  function yToS(y) {
    const s = ((mt + ph - y) / ph) * S_MAX;
    return Math.min(S_MAX, Math.max(0, s));
  }

  /** Osa rychlosti: výška grafu = 0…S_MAX „dílků“, 1 dílek = VELOCITY_AXIS_MPS_PER_DIV m/s. */
  function vToY(vMps) {
    return sToY(vMps / VELOCITY_AXIS_MPS_PER_DIV);
  }

  function yToV(y) {
    return yToS(y) * VELOCITY_AXIS_MPS_PER_DIV;
  }

  function snapChartXToTimeGrid(x) {
    const xP = Math.min(ml + pw, Math.max(ml, x));
    const tRaw = xToT(xP);
    const tGrid =
      Math.round(tRaw / TIME_AXIS_STEP) * TIME_AXIS_STEP;
    const tSn = Math.min(T_MAX, Math.max(0, tGrid));
    const xGrid = tToX(tSn);
    if (Math.abs(xGrid - xP) <= CHART_GRID_SNAP_PX) return xGrid;
    return xP;
  }

  /** Svislé čáry drawGrid — vzdálenost / dílek na ose případně rychlost / 2 m·s⁻¹. */
  function snapChartYToValueGrid(y) {
    const yP = Math.min(mt + ph, Math.max(mt, y));
    if (yAxisMode === "velocity") {
      const vRaw = yToV(yP);
      const vGrid =
        Math.round(vRaw / VELOCITY_AXIS_MPS_PER_DIV) *
        VELOCITY_AXIS_MPS_PER_DIV;
      const vSn = Math.min(velocityGraphMaxMps(), Math.max(0, vGrid));
      const yGrid = vToY(vSn);
      if (Math.abs(yGrid - yP) <= CHART_GRID_SNAP_PX) return yGrid;
    } else {
      const sRaw = yToS(yP);
      const sSn = Math.min(S_MAX, Math.max(0, Math.round(sRaw)));
      const yGrid = sToY(sSn);
      if (Math.abs(yGrid - yP) <= CHART_GRID_SNAP_PX) return yGrid;
    }
    return yP;
  }

  function snapChartXYToGrid(x, y) {
    return { x: snapChartXToTimeGrid(x), y: snapChartYToValueGrid(y) };
  }

  /**
   * Dva nezávislé grafy (sdílený počátek [0,0]).
   * @type {{ t: number, s: number }[]}
   */
  let points = [];
  let points2 = [];

  /** Počáteční rychlost [m/s]; null = uživatel ji zvolí klikem na svislou osu. */
  let velocityV0 = { 1: null, 2: null };
  /** Šířka klikacího pásu u svislé osy pro volbu počáteční rychlosti. */
  const AXIS_PICK_W = 36;
  let chartClickPreviewGroup = null;
  let chartClickPreviewCircle = null;

  function graphIdFromPointsArr(arr) {
    return arr === points2 ? 2 : 1;
  }

  function velocityV0ForGraph(g) {
    const r = velocityV0[g];
    if (r == null) return 0;
    return Math.min(velocityGraphMaxMps(), Math.max(0, r));
  }

  /** Zobrazení a simulace druhého grafu (checkbox). */
  let dualGraph = false;

  /** @type {"start"|"cumulative"|"velocity"} zobrazení svislé osy a křivky. */
  let yAxisMode = "start";

  function syncYAxisModeFromRadios() {
    const r = document.querySelector('input[name="axisY"]:checked');
    const val = r && r.value;
    if (val === "cumulative" || val === "velocity") yAxisMode = val;
    else yAxisMode = "start";
  }

  function syncGraphTargetRadios() {
    document.querySelectorAll('input[name="graphTarget"]').forEach(function (el) {
      el.disabled = !dualGraph;
    });
  }

  let running = false;
  let simT = 0;
  let lastFrame = 0;
  let raf = 0;
  /** Kumulativní natočení kol (°) pro animaci — po každém „Spustit“ se nuluje v kódu přehrávání. */
  let trackWheelPhaseDeg1 = 0;
  let trackWheelPhaseDeg2 = 0;

  function sortPointsArr(arr) {
    if (!arr.length) return;
    arr.sort((a, b) => a.t - b.t || a.s - b.s);
    const eps = 0.03;
    for (let i = 1; i < arr.length; i++) {
      const lo = arr[i - 1].t + eps;
      if (arr[i].t < lo) arr[i].t = lo;
      arr[i].t = Math.min(T_MAX, arr[i].t);
      const smax = yAxisMode === "velocity" ? velocityGraphMaxMps() : S_MAX;
      arr[i].s = Math.min(smax, Math.max(0, arr[i].s));
    }
    if (arr.length && arr[0].t < eps) arr[0].t = eps;

    if (yAxisMode === "cumulative") {
      let minS = 0;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i].s < minS) arr[i].s = minS;
        minS = arr[i].s;
        if (minS > S_MAX) {
          arr[i].s = S_MAX;
          minS = S_MAX;
        }
      }
    }
  }

  /** Stejné zamítnutí jako při přidávání bodu (příliš blízko počátku / existujícímu uzlu). */
  function wouldRejectNewPoint(targetArr, g, t, val) {
    const nt = t / T_MAX;
    const nScale = yAxisMode === "velocity" ? velocityGraphMaxMps() : S_MAX;
    const oriSpeed = yAxisMode === "velocity" ? velocityV0ForGraph(g) : 0;
    const nearOrigin =
      targetArr.length > 0 &&
      nt * nt + Math.pow((val - oriSpeed) / nScale, 2) < 0.03 * 0.03;
    if (nearOrigin) return true;
    return targetArr.some(function (p) {
      const dx = (p.t - t) / T_MAX;
      const dy = (p.s - val) / nScale;
      return dx * dx + dy * dy < 0.03 * 0.03;
    });
  }

  /**
   * Souřadnice uzlu po řazení a úpravách sortPointsArr — stejné jako po kliknutí.
   */
  function finalCoordsAfterHypotheticalAdd(targetArr, t, val) {
    const trial = targetArr.map(function (p) {
      return { t: p.t, s: p.s };
    });
    const newPt = { t, s: val };
    trial.push(newPt);
    sortPointsArr(trial);
    return { t: newPt.t, s: newPt.s };
  }

  /** Počátek [0,0] + uživatelské body daného grafu. */
  function verticesFrom(arr) {
    sortPointsArr(arr);
    if (arr.length === 0) return [];
    return [{ t: 0, s: 0 }].concat(arr);
  }

  const LENGTH_DISPLAY_MULT = 10;
  /** Jedna „úsečka“ trati v metrech (souhlasí s rozsahem osy vzdálenosti 0…S_MAX). */
  const TRACK_SEGMENT_METERS = S_MAX * LENGTH_DISPLAY_MULT;
  const JET_SPEED_THRESHOLD_MS = 14;

  /** V režimu rychlosti ukládá každý bod {t, s} hodnotu s = rychlost v m/s (0…velocityGraphMaxMps()). */

  function velocityKnotsFromUserPoints(arr, graphId) {
    const g = graphId != null ? graphId : graphIdFromPointsArr(arr);
    const raw = velocityV0[g];
    const v0 = raw == null ? 0 : Math.min(velocityGraphMaxMps(), Math.max(0, raw));
    const k = [{ t: 0, vg: v0 }];
    for (let i = 0; i < arr.length; i++) {
      k.push({ t: arr[i].t, vg: arr[i].s });
    }
    return k;
  }

  function positionKnotsFromVelocityUser(arr, graphId) {
    const vk = velocityKnotsFromUserPoints(arr, graphId);
    if (vk.length < 2) return [{ t: 0, s: 0 }];
    const pos = [{ t: 0, s: 0 }];
    let sAcc = 0;
    for (let i = 0; i < vk.length - 1; i++) {
      const a = vk[i];
      const b = vk[i + 1];
      const dt = b.t - a.t;
      if (dt <= 1e-9) {
        pos.push({ t: b.t, s: Math.max(0, sAcc) });
        continue;
      }
      sAcc += (((a.vg + b.vg) / 2) * dt) / LENGTH_DISPLAY_MULT;
      sAcc = Math.max(0, sAcc);
      pos.push({ t: b.t, s: sAcc });
    }
    return pos;
  }

  function distanceAtFromVelocityUser(arr, t, graphId) {
    const g = graphId != null ? graphId : graphIdFromPointsArr(arr);
    sortPointsArr(arr);
    if (!arr.length) return 0;
    const vk = velocityKnotsFromUserPoints(arr, g);
    const pos = positionKnotsFromVelocityUser(arr, g);
    if (t <= 0) return 0;
    const lastT = vk[vk.length - 1].t;
    const lastS = pos[pos.length - 1].s;
    if (t >= lastT) return lastS;
    for (let i = 0; i < vk.length - 1; i++) {
      const a = vk[i];
      const b = vk[i + 1];
      if (t >= a.t && t <= b.t) {
        const dt = b.t - a.t;
        if (dt < 1e-9) return pos[i].s;
        const tau = t - a.t;
        const s0 = pos[i].s;
        return (
          s0 +
          (a.vg * tau + ((b.vg - a.vg) / (2 * dt)) * tau * tau) / LENGTH_DISPLAY_MULT
        );
      }
    }
    return lastS;
  }

  function vGraphAtVelocityUser(arr, t, graphId) {
    const g = graphId != null ? graphId : graphIdFromPointsArr(arr);
    sortPointsArr(arr);
    if (!arr.length) return 0;
    const vk = velocityKnotsFromUserPoints(arr, g);
    const last = vk[vk.length - 1];
    if (t > last.t) return 0;
    if (t <= 0) return 0;
    for (let i = 0; i < vk.length - 1; i++) {
      const a = vk[i];
      const b = vk[i + 1];
      if (t >= a.t && t <= b.t) {
        const dt = b.t - a.t;
        if (dt < 1e-9) return a.vg;
        const tau = t - a.t;
        return a.vg + ((b.vg - a.vg) / dt) * tau;
      }
    }
    return 0;
  }

  /** Libovolný lomený v(t) podle uživatelských uzlů (přímky mezi nimi). */
  function velocityUserPolylinePointsString(arr, graphId) {
    const g = graphId != null ? graphId : graphIdFromPointsArr(arr);
    const raw = velocityV0[g];
    if (raw == null && arr.length === 0) return "";
    sortPointsArr(arr);
    const v0 = raw == null ? 0 : Math.min(velocityGraphMaxMps(), Math.max(0, raw));
    const pts = [tToX(0).toFixed(2) + "," + vToY(v0).toFixed(2)];
    for (let i = 0; i < arr.length; i++) {
      const vm = Math.min(velocityGraphMaxMps(), Math.max(0, arr[i].s));
      pts.push(tToX(arr[i].t).toFixed(2) + "," + vToY(vm).toFixed(2));
    }
    return pts.join(" ");
  }

  function trackMetersFromDistanceAxis(distAxis) {
    return distAxis * LENGTH_DISPLAY_MULT;
  }

  /**
   * Pozice na trati v režimu rychlosti: celá dráha může být delší než 80 m,
   * na trati se zobrazí zbytek po 80 m; přesně na násobcích 80 m = levý okraj (nové kolo).
   */
  function trackDisplayMetersFromAxis(distAxis) {
    const m = trackMetersFromDistanceAxis(distAxis);
    if (yAxisMode !== "velocity") {
      return Math.min(TRACK_SEGMENT_METERS, Math.max(0, m));
    }
    if (m <= TRACK_SEGMENT_METERS + 1e-9) {
      return Math.min(m, TRACK_SEGMENT_METERS);
    }
    let w = m % TRACK_SEGMENT_METERS;
    if (w < 1e-9) w = 0;
    return w;
  }

  function trackDisplayAxisFromDistanceAxis(distAxis) {
    return trackDisplayMetersFromAxis(distAxis) / LENGTH_DISPLAY_MULT;
  }

  /** Posun popisků na trati (0, 80, 160 … m) podle ujeté dráhy u prvního grafu. */
  function trackLabelBaseMetersForTime(t) {
    if (yAxisMode !== "velocity") return 0;
    const m = trackMetersFromDistanceAxis(distanceAtFrom(points, t));
    if (m <= TRACK_SEGMENT_METERS + 1e-9) return 0;
    return Math.floor(m / TRACK_SEGMENT_METERS) * TRACK_SEGMENT_METERS;
  }

  /** Po částech lineární s(t) mezi uzly; režim rychlosti = s z integrovaného v(t). */
  function distanceAtFrom(arr, t) {
    if (yAxisMode === "velocity")
      return distanceAtFromVelocityUser(arr, t, graphIdFromPointsArr(arr));
    const v = verticesFrom(arr);
    if (v.length === 0) return 0;
    if (t <= v[0].t) return v[0].s;
    const last = v[v.length - 1];
    if (t >= last.t) return last.s;
    for (let i = 0; i < v.length - 1; i++) {
      const a = v[i];
      const b = v[i + 1];
      if (t >= a.t && t <= b.t) {
        const u = (t - a.t) / (b.t - a.t || 1e-9);
        return a.s + u * (b.s - a.s);
      }
    }
    return last.s;
  }

  function simEndTimeFrom(arr) {
    if (yAxisMode === "velocity") {
      sortPointsArr(arr);
      if (arr.length < 1) return 0;
      return Math.min(T_MAX, arr[arr.length - 1].t);
    }
    const v = verticesFrom(arr);
    if (v.length < 2) return 0;
    return Math.min(T_MAX, v[v.length - 1].t);
  }

  function simEndTime() {
    const e1 = simEndTimeFrom(points);
    if (!dualGraph) return e1;
    return Math.max(e1, simEndTimeFrom(points2));
  }

  /** Režim vzdálenost: ds/dt v jednotkách osy / s. Režim rychlost: v v m/s. Pro t ≥ konec grafu → 0 v režimu rychlosti. */
  function derivativeSignedAtFrom(arr, t) {
    if (yAxisMode === "velocity")
      return vGraphAtVelocityUser(arr, t, graphIdFromPointsArr(arr));
    const v = verticesFrom(arr);
    if (v.length < 2) return 0;
    const last = v[v.length - 1];
    if (t >= last.t) {
      const a = v[v.length - 2];
      const b = last;
      const dt = b.t - a.t;
      if (dt <= 1e-9) return 0;
      return (b.s - a.s) / dt;
    }
    if (t <= v[0].t) {
      const dt = v[1].t - v[0].t;
      if (dt <= 1e-9) return 0;
      return (v[1].s - v[0].s) / dt;
    }
    for (let i = 0; i < v.length - 1; i++) {
      const a = v[i];
      const b = v[i + 1];
      if (t >= a.t && t <= b.t) {
        const dt = b.t - a.t;
        if (dt <= 1e-9) return 0;
        return (b.s - a.s) / dt;
      }
    }
    return 0;
  }

  function speedDisplayAtFrom(arr, t) {
    if (yAxisMode === "velocity") {
      if (!arr.length) return 0;
      return Math.abs(derivativeSignedAtFrom(arr, t));
    }
    const v = verticesFrom(arr);
    if (v.length < 2) return 0;
    if (t >= v[v.length - 1].t) return 0;
    return Math.abs(derivativeSignedAtFrom(arr, t)) * LENGTH_DISPLAY_MULT;
  }

  function buildJetGroup(NS) {
    const j = document.createElementNS(NS, "g");
    j.setAttribute("class", "cyclist-jet");
    j.setAttribute("pointer-events", "none");
    j.setAttribute("transform", "translate(11.2,27.5)");

    const outer = document.createElementNS(NS, "path");
    outer.setAttribute("d", "M0,-7 L-22,-2.5 L-26,0 L-22,2.5 L0,7 Z");
    outer.setAttribute("fill", "#ff6b35");

    const mid = document.createElementNS(NS, "path");
    mid.setAttribute("d", "M0,-4 L-15,-1.2 L-18,0 L-15,1.2 L0,4 Z");
    mid.setAttribute("fill", "#ff9800");

    const inner = document.createElementNS(NS, "path");
    inner.setAttribute("d", "M0,-2 L-10,-0.5 L-12,0 L-10,0.5 L0,2 Z");
    inner.setAttribute("fill", "#ffeb3b");

    const core = document.createElementNS(NS, "path");
    core.setAttribute("d", "M0,-1 L-6,0 L0,1 Z");
    core.setAttribute("fill", "#fff9c4");

    j.appendChild(outer);
    j.appendChild(mid);
    j.appendChild(inner);
    j.appendChild(core);
    return j;
  }

  function syncJetPropulsion(riderG, ptsArr) {
    if (!riderG) return;
    const wantJet =
      (running || simT > 0) &&
      simEndTimeFrom(ptsArr) > 0 &&
      speedDisplayAtFrom(ptsArr, simT) > JET_SPEED_THRESHOLD_MS;
    const jet = riderG.querySelector(".cyclist-jet");
    if (!wantJet) {
      if (jet) jet.remove();
      return;
    }
    if (!jet) {
      riderG.insertBefore(buildJetGroup("http://www.w3.org/2000/svg"), riderG.firstChild);
    }
  }

  function updateRunButton() {
    const ok = points.length >= 1 || (dualGraph && points2.length >= 1);
    btnRun.disabled = !ok;
  }

  /** Červený bod na grafu během / po simulaci – (t, s) = časomíra + dráha z grafu. */
  function chartTimeIndicatorVisible() {
    return (running || simT > 0) && simEndTime() > 0;
  }

  function chartIndicatorVerticalValue(arr, tDraw) {
    if (yAxisMode === "velocity") {
      const dm = derivativeSignedAtFrom(arr, tDraw);
      return Math.min(velocityGraphMaxMps(), Math.max(0, dm));
    }
    return distanceAtFrom(arr, tDraw);
  }

  /** Nejvyšší čas na nakreslené křivce (stejný konec jako polyline). */
  function chartPlaybackUpperBoundT(arr) {
    sortPointsArr(arr);
    if (!arr.length) return 0;
    if (yAxisMode === "velocity") {
      return Math.min(T_MAX, arr[arr.length - 1].t);
    }
    const v = verticesFrom(arr);
    if (v.length < 2) return 0;
    return Math.min(T_MAX, v[v.length - 1].t);
  }

  /**
   * Pozice ukazatele: čas nikdy za poslední uzel; na konci přesně střed posledního uzlu
   * (oprava vodorovného „jetí“ při s(t)=konst. za posledním bodem nebo float/simT).
   */
  function indicatorCoordsForGraph(arr, simTClampedGlobal) {
    const tLim = chartPlaybackUpperBoundT(arr);
    if (!(tLim > 0)) return null;
    const tWant = Math.min(simTClampedGlobal, tLim);
    const epsT = 5e-7;
    if (tWant >= tLim - epsT) {
      if (yAxisMode === "velocity") {
        const vm = Math.min(
          velocityGraphMaxMps(),
          Math.max(0, arr[arr.length - 1].s)
        );
        return { cx: tToX(arr[arr.length - 1].t), cyPlot: vm };
      }
      const v = verticesFrom(arr);
      const lp = v[v.length - 1];
      return { cx: tToX(lp.t), cyPlot: lp.s };
    }
    const yPlot = chartIndicatorVerticalValue(arr, tWant);
    return { cx: tToX(tWant), cyPlot: yPlot };
  }

  function updateChartTimeIndicator() {
    const dot = chartEl.querySelector("#chart-time-indicator");
    const dot2 = chartEl.querySelector("#chart-time-indicator-2");

    if (!chartTimeIndicatorVisible()) {
      if (dot) dot.remove();
      if (dot2) dot2.remove();
      return;
    }

    const endT = simEndTime();
    const simTClamped = Math.min(Math.max(0, simT), endT);

    function placeIndicator(el, id, fill, stroke, arr) {
      const coords = indicatorCoordsForGraph(arr, simTClamped);
      if (!coords) {
        if (el) el.remove();
        return;
      }
      let d = el;
      if (!d) {
        d = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        d.setAttribute("id", id);
        d.setAttribute("r", "6");
        d.setAttribute("fill", fill);
        d.setAttribute("stroke", stroke);
        d.setAttribute("stroke-width", "2");
        d.setAttribute("pointer-events", "none");
        chartEl.appendChild(d);
      }
      d.setAttribute("cx", String(coords.cx));
      d.setAttribute(
        "cy",
        String(yAxisMode === "velocity" ? vToY(coords.cyPlot) : sToY(coords.cyPlot))
      );
    }

    const end1 = simEndTimeFrom(points);
    if (end1 > 0) {
      placeIndicator(
        dot,
        "chart-time-indicator",
        "#d92222",
        "#ffffff",
        points
      );
    } else if (dot) {
      dot.remove();
    }

    const end2 = dualGraph ? simEndTimeFrom(points2) : 0;
    if (dualGraph && end2 > 0) {
      placeIndicator(
        dot2,
        "chart-time-indicator-2",
        "#1565c0",
        "#ffffff",
        points2
      );
    } else if (dot2) {
      dot2.remove();
    }
  }

  function formatTimer(t) {
    const sec = Math.floor(t);
    const frac = Math.floor((t - sec) * 100);
    const a = String(sec).padStart(2, "0");
    const b = String(frac).padStart(2, "0");
    return a + " : " + b;
  }

  function buildDefs(svg) {
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    defs.innerHTML =
      '<marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">' +
      '<path d="M0,0 L8,4 L0,8 Z" fill="#1e6bb8" /></marker>';
    svg.appendChild(defs);
  }

  function drawGrid(svg) {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "grid");
    g.setAttribute("pointer-events", "none");

    for (let t = 0; t <= T_MAX; t += TIME_AXIS_STEP) {
      const x = tToX(t);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x);
      line.setAttribute("x2", x);
      line.setAttribute("y1", mt);
      line.setAttribute("y2", mt + ph);
      line.setAttribute("stroke", "var(--grid)");
      line.setAttribute("stroke-width", "1");
      line.setAttribute("stroke-dasharray", "3 5");
      g.appendChild(line);
    }

    for (let si = 0; si <= S_MAX; si++) {
      const y = sToY(si);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", ml);
      line.setAttribute("x2", ml + pw);
      line.setAttribute("y1", y);
      line.setAttribute("y2", y);
      line.setAttribute("stroke", "var(--grid)");
      line.setAttribute("stroke-width", "1");
      line.setAttribute("stroke-dasharray", "3 5");
      g.appendChild(line);
    }

    svg.appendChild(g);
  }

  function drawAxes(svg) {
    const axisColor = "#1e6bb8";
    const ax = document.createElementNS("http://www.w3.org/2000/svg", "g");
    ax.setAttribute("pointer-events", "none");

    const yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
    yAxis.setAttribute("x1", ml);
    yAxis.setAttribute("y1", mt + ph);
    yAxis.setAttribute("x2", ml);
    yAxis.setAttribute("y2", mt - 4);
    yAxis.setAttribute("stroke", axisColor);
    yAxis.setAttribute("stroke-width", "2");
    yAxis.setAttribute("marker-end", "url(#arrowBlue)");
    ax.appendChild(yAxis);

    const xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
    xAxis.setAttribute("x1", ml);
    xAxis.setAttribute("y1", mt + ph);
    xAxis.setAttribute("x2", ml + pw + 6);
    xAxis.setAttribute("y2", mt + ph);
    xAxis.setAttribute("stroke", axisColor);
    xAxis.setAttribute("stroke-width", "2");
    xAxis.setAttribute("marker-end", "url(#arrowBlue)");
    ax.appendChild(xAxis);

    const xl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    xl.setAttribute("x", ml + pw / 2);
    xl.setAttribute("y", H - 6);
    xl.setAttribute("text-anchor", "middle");
    xl.setAttribute("fill", axisColor);
    xl.setAttribute("font-size", "14");
    xl.textContent = "Čas";
    ax.appendChild(xl);

    /** Střed šipky Y osy (od špičky mt−4 po základ mt+ph); popisek vycentrovaný a vlevo od dílků. */
    const yAxisLabelCy = (mt - 4 + mt + ph) / 2;
    const yAxisLabelX = 16;
    const yl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    yl.setAttribute("x", String(yAxisLabelX));
    yl.setAttribute("y", String(yAxisLabelCy));
    yl.setAttribute("text-anchor", "middle");
    yl.setAttribute("dominant-baseline", "middle");
    yl.setAttribute("fill", axisColor);
    yl.setAttribute("font-size", "14");
    yl.setAttribute(
      "transform",
      "rotate(-90 " + yAxisLabelX + " " + yAxisLabelCy + ")"
    );
    yl.textContent =
      yAxisMode === "cumulative"
        ? "Celkově ujetá vzdálenost"
        : yAxisMode === "velocity"
          ? "Rychlost"
          : "Vzdálenost od startu";
    ax.appendChild(yl);

    for (let t = 0; t <= T_MAX; t += TIME_AXIS_STEP) {
      const x = tToX(t);
      const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
      tick.setAttribute("x1", x);
      tick.setAttribute("x2", x);
      tick.setAttribute("y1", mt + ph);
      tick.setAttribute("y2", mt + ph + 6);
      tick.setAttribute("stroke", axisColor);
      ax.appendChild(tick);
      const lab = document.createElementNS("http://www.w3.org/2000/svg", "text");
      lab.setAttribute("x", x);
      lab.setAttribute("y", mt + ph + 22);
      lab.setAttribute("text-anchor", "middle");
      lab.setAttribute("font-size", "11");
      lab.setAttribute("fill", "#444");
      lab.textContent = String(t) + " s";
      ax.appendChild(lab);
    }

    for (let si = 0; si <= S_MAX; si++) {
      const y = sToY(si);
      const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
      tick.setAttribute("x1", ml - 6);
      tick.setAttribute("x2", ml);
      tick.setAttribute("y1", y);
      tick.setAttribute("y2", y);
      tick.setAttribute("stroke", axisColor);
      ax.appendChild(tick);
      const lab = document.createElementNS("http://www.w3.org/2000/svg", "text");
      lab.setAttribute("x", ml - 10);
      lab.setAttribute("y", y + 4);
      lab.setAttribute("text-anchor", "end");
      lab.setAttribute("font-size", "11");
      lab.setAttribute("fill", "#444");
      lab.textContent =
        yAxisMode === "velocity"
          ? String(si * VELOCITY_AXIS_MPS_PER_DIV) + " m/s"
          : si * 10 + " m";
      ax.appendChild(lab);
    }

    svg.appendChild(ax);
  }

  let handlesLayer = null;

  /** Po úpravě grafu jezdci zůstanou v počátku dráhy (jen ve stavu bez běžící simulace). */
  function resetPlaybackToStartIfPaused() {
    if (running) return;
    simT = 0;
    lastFrame = 0;
    timerEl.textContent = formatTimer(0);
    trackWheelPhaseDeg1 = 0;
    trackWheelPhaseDeg2 = 0;
  }

  function redrawChart() {
    resetPlaybackToStartIfPaused();
    chartEl.innerHTML = "";
    buildDefs(chartEl);
    drawGrid(chartEl);

    drawAxes(chartEl);

    sortPointsArr(points);
    sortPointsArr(points2);
    const v1 = verticesFrom(points);
    const d1 =
      yAxisMode === "velocity"
        ? velocityUserPolylinePointsString(points, 1)
        : v1.length >= 2
          ? v1.map((p) => tToX(p.t).toFixed(2) + "," + sToY(p.s).toFixed(2)).join(" ")
          : "";
    const v2dual = dualGraph ? verticesFrom(points2) : [];
    const d2 =
      dualGraph && yAxisMode === "velocity"
        ? velocityUserPolylinePointsString(points2, 2)
        : dualGraph && v2dual.length >= 2
          ? v2dual.map((p) => tToX(p.t).toFixed(2) + "," + sToY(p.s).toFixed(2)).join(" ")
          : "";

    /** Pod kolečky – klikací plocha. Viditelná výplň skoro nulová – Safari často nebere úplně průhledné plochy. */
    const plotHit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    plotHit.setAttribute("id", "plot-hit-layer");
    plotHit.setAttribute("x", ml);
    plotHit.setAttribute("y", mt);
    plotHit.setAttribute("width", pw);
    plotHit.setAttribute("height", ph);
    plotHit.setAttribute("fill", "#ffffff");
    plotHit.setAttribute("fill-opacity", "0.003");
    plotHit.setAttribute("stroke", "none");
    plotHit.setAttribute("pointer-events", "all");
    chartEl.appendChild(plotHit);

    bindPlotHit(plotHit);

    if (yAxisMode === "velocity") {
      const axisPick = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      axisPick.setAttribute("x", String(ml - AXIS_PICK_W));
      axisPick.setAttribute("y", String(mt));
      axisPick.setAttribute("width", String(AXIS_PICK_W));
      axisPick.setAttribute("height", String(ph));
      axisPick.setAttribute("fill", "#ffffff");
      axisPick.setAttribute("fill-opacity", "0.004");
      axisPick.setAttribute("stroke", "none");
      axisPick.setAttribute("pointer-events", "all");
      axisPick.addEventListener("mousedown", function (ev) {
        if (ev.button !== 0 || running) return;
        ev.preventDefault();
        ev.stopPropagation();
        pickVelocityV0FromEvent(ev);
      });
      axisPick.addEventListener(
        "touchstart",
        function (ev) {
          if (running) return;
          ev.preventDefault();
          ev.stopPropagation();
          pickVelocityV0FromEvent(ev);
        },
        { passive: false }
      );
      chartEl.appendChild(axisPick);
    }

    const editGraph = dualGraph ? getActiveGraph() : 1;

    handlesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    handlesLayer.setAttribute("class", "handles");
    if (yAxisMode !== "velocity") {
      const origin = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      origin.setAttribute("cx", tToX(0));
      origin.setAttribute("cy", sToY(0));
      origin.setAttribute("r", "7");
      origin.setAttribute("fill", "#fff");
      origin.setAttribute("stroke", "#444");
      origin.setAttribute("stroke-width", "2");
      origin.setAttribute("opacity", "0.95");
      origin.style.cursor = "default";
      origin.style.pointerEvents = "none";
      origin.dataset.role = "origin";
      handlesLayer.appendChild(origin);
    }
    if (yAxisMode === "velocity") {
      if (velocityV0[1] != null) {
        const o1 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        o1.setAttribute("cx", tToX(0));
        o1.setAttribute("cy", vToY(velocityV0ForGraph(1)));
        o1.setAttribute("r", "7");
        o1.setAttribute("fill", "#fff");
        o1.setAttribute("stroke", "#1e6bb8");
        o1.setAttribute("stroke-width", "2");
        o1.setAttribute("opacity", "0.95");
        o1.style.cursor = dualGraph && editGraph !== 1 ? "default" : "ns-resize";
        o1.style.pointerEvents = dualGraph && editGraph !== 1 ? "none" : "auto";
        o1.dataset.role = "velocity-origin";
        o1.setAttribute("data-graph", "1");
        handlesLayer.appendChild(o1);
        bindVelocityOriginDrag(o1, 1);
      }
      if (dualGraph && velocityV0[2] != null) {
        const o2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        o2.setAttribute("cx", tToX(0));
        o2.setAttribute("cy", vToY(velocityV0ForGraph(2)));
        o2.setAttribute("r", "7");
        o2.setAttribute("fill", "#fff");
        o2.setAttribute("stroke", "#2e7d32");
        o2.setAttribute("stroke-width", "2");
        o2.setAttribute("opacity", "0.95");
        o2.style.cursor = editGraph !== 2 ? "default" : "ns-resize";
        o2.style.pointerEvents = editGraph !== 2 ? "none" : "auto";
        o2.dataset.role = "velocity-origin";
        o2.setAttribute("data-graph", "2");
        handlesLayer.appendChild(o2);
        bindVelocityOriginDrag(o2, 2);
      }
    }
    points.forEach(function (p, idx) {
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", tToX(p.t));
      c.setAttribute(
        "cy",
        yAxisMode === "velocity"
          ? vToY(Math.min(velocityGraphMaxMps(), Math.max(0, p.s)))
          : sToY(p.s)
      );
      c.setAttribute("r", "7");
      c.setAttribute("fill", "#fff");
      c.setAttribute("stroke", "#1e6bb8");
      c.setAttribute("stroke-width", "2");
      c.style.cursor = dualGraph && editGraph !== 1 ? "default" : "grab";
      c.style.pointerEvents = dualGraph && editGraph !== 1 ? "none" : "auto";
      c.setAttribute("data-index", String(idx));
      c.setAttribute("data-graph", "1");
      c.dataset.index = String(idx);
      c.dataset.graph = "1";
      bindUserCircleDrag(c, idx, 1);
      handlesLayer.appendChild(c);
    });
    if (dualGraph) {
      points2.forEach(function (p, idx) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", tToX(p.t));
        c.setAttribute(
          "cy",
          yAxisMode === "velocity"
            ? vToY(Math.min(velocityGraphMaxMps(), Math.max(0, p.s)))
            : sToY(p.s)
        );
        c.setAttribute("r", "7");
        c.setAttribute("fill", "#fff");
        c.setAttribute("stroke", "#2e7d32");
        c.setAttribute("stroke-width", "2");
        c.style.cursor = editGraph !== 2 ? "default" : "grab";
        c.style.pointerEvents = editGraph !== 2 ? "none" : "auto";
        c.setAttribute("data-index", String(idx));
        c.setAttribute("data-graph", "2");
        c.dataset.index = String(idx);
        c.dataset.graph = "2";
        bindUserCircleDrag(c, idx, 2);
        handlesLayer.appendChild(c);
      });
    }
    chartEl.appendChild(handlesLayer);

    /** Čára nad kolečky → graf vizuálně „protíná“ středy bodů. */
    if (d1) {
      const pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      pl.setAttribute("fill", "none");
      pl.setAttribute("stroke", "#111");
      pl.setAttribute("stroke-width", "2.5");
      pl.setAttribute("stroke-linejoin", "round");
      pl.setAttribute("stroke-linecap", "round");
      pl.setAttribute("points", d1);
      pl.setAttribute("pointer-events", "none");
      chartEl.appendChild(pl);

  function applyCyclistWheelTransforms(riderOuterG, phaseDeg) {
    const sprite = riderOuterG && riderOuterG.querySelector("svg");

    const deg = typeof phaseDeg === "number" && phaseDeg === phaseDeg ? phaseDeg : 0;
    const front = sprite.querySelector(".cyclist-wheel-front");
    const rear = sprite.querySelector(".cyclist-wheel-rear");
    const tF =
      "rotate(" +

      " " +
      WHEEL_HUB_FRONT_X +
      " " +

      "rotate(" + deg + " " + WHEEL_HUB_REAR_X + " " + WHEEL_HUB_REAR_Y + ")";
    if (front) front.setAttribute("transform", tF);
    if (rear) rear.setAttribute("transform", tR);

  const RIDER_LEG_GEAR_RATIO = 1.8;

  const RIDER_FRONT_LEG_DOWN_SCALE = 0.35;

  const RIDER_FRONT_KNEE_SWING_DEG = 14;

  function applyCyclistLegMotion(riderOuterG, phaseDeg) {
    const sprite = riderOuterG && riderOuterG.querySelector("svg");
    if (!sprite) return;
    const safe = typeof phaseDeg === "number" && phaseDeg === phaseDeg ? phaseDeg : 0;
    const legPhaseRad = ((safe / RIDER_LEG_GEAR_RATIO) * Math.PI) / 180;
    const legOsc = Math.sin(legPhaseRad);
    const dyFront =
      RIDER_LEG_AMPLITUDE *
      legOsc *
      (legOsc > 0 ? RIDER_FRONT_LEG_DOWN_SCALE : 1);
    const dyRear = -RIDER_LEG_AMPLITUDE * legOsc;
    const kneeDeg = legOsc * RIDER_FRONT_KNEE_SWING_DEG;
    const fronts = sprite.getElementsByClassName("cyclist-leg-front");
    const rears = sprite.getElementsByClassName("cyclist-leg-rear");
    for (let i = 0; i < fronts.length; i++) {
      fronts[i].setAttribute(
        "transform",
        "translate(0," +
          dyFront +
          ") rotate(" +
          kneeDeg +
          " " +
          RIDER_FRONT_HIP_X +
          " " +
          RIDER_FRONT_HIP_Y +
          ")"

    for (let i = 0; i < rears.length; i++) {
      rears[i].setAttribute("transform", "translate(0," + dyRear + ")");
    }

  const RIDER2_HELMET_FILL = "#2563EB";

  function applyCyclistHelmetColors(riderOuterG, fill, stroke) {

      paths[i].setAttribute("stroke", s);

    const artWrap = document.createElementNS(NS, "g");
    artWrap.setAttribute("transform", "translate(0," + RIDER_SVG_OFFSET_Y + ")");
    const legClipId = "leg-clip-" + (++trackRiderUidCounter);

    if (parsed.querySelector("parsererror")) {

    } else {
      artWrap.appendChild(document.importNode(parsed.documentElement, true));

    g.appendChild(artWrap);

    applyCyclistWheelTransforms(
      g,
      typeof wheelPhaseDeg === "number" ? wheelPhaseDeg : 0
    );
    applyCyclistLegMotion(
      g,
      typeof wheelPhaseDeg === "number" ? wheelPhaseDeg : 0
    );
    syncJetPropulsion(g, ptsArr);
    if (helmetOpts && helmetOpts.fill) {
      applyCyclistHelmetColors(g, helmetOpts.fill, helmetOpts.stroke);
    }
    return g;
  }

  let trackRider = null;
  let trackRider2 = null;
  let trackLine = null;

  function drawTrack() {
    trackEl.innerHTML = "";
    trackEl.setAttribute("viewBox", "0 " + TRACK_VIEW_Y_MIN + " " + TW + " " + TRACK_VIEW_HEIGHT);
    trackRider2 = null;
    const inner = trackInnerWidth();
    const ly = String(TRACK_LINE_Y);

    trackLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
    trackLine.setAttribute("x1", String(TRACK_X_MARGIN));
    trackLine.setAttribute("y1", ly);
    trackLine.setAttribute("x2", String(TW - TRACK_X_MARGIN));
    trackLine.setAttribute("y2", ly);
    trackLine.setAttribute("stroke", "#111");
    trackLine.setAttribute("stroke-width", "3");
    trackEl.appendChild(trackLine);

    const t0 = running || simT > 0 ? simT : 0;
    const labelBase = trackLabelBaseMetersForTime(t0);

    for (let si = 0; si <= S_MAX; si++) {
      const x = TRACK_X_MARGIN + (si / S_MAX) * inner;
      const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
      tick.setAttribute("x1", x);
      tick.setAttribute("x2", x);
      tick.setAttribute("y1", ly);
      tick.setAttribute("y2", String(TRACK_LINE_Y + 10));
      tick.setAttribute("stroke", "#444");
      trackEl.appendChild(tick);
      const lab = document.createElementNS("http://www.w3.org/2000/svg", "text");
      lab.setAttribute("font-size", "11");
      lab.setAttribute("fill", "#444");
      lab.textContent = si * 10 + labelBase + " m";
      if (si === 0) {
        lab.setAttribute("x", String(TRACK_X_MARGIN + 2));
        lab.setAttribute("text-anchor", "start");
      } else if (si === S_MAX) {
        lab.setAttribute("x", String(TW - TRACK_X_MARGIN - 2));
        lab.setAttribute("text-anchor", "end");
      } else {
        lab.setAttribute("x", x);
        lab.setAttribute("text-anchor", "middle");
      }
      lab.setAttribute("y", String(TH - 8));
      trackEl.appendChild(lab);
    }

    const dist1 = distanceAtFrom(points, t0);
    const cx1 = trackXFromDist(dist1);
    trackRider = createTrackRiderGroup(cx1, points, trackWheelPhaseDeg1);
    trackEl.appendChild(trackRider);

    if (dualGraph) {
      const dist2 = distanceAtFrom(points2, t0);
      const cx2 = trackXFromDist(dist2);
      trackRider2 = createTrackRiderGroup(cx2, points2, trackWheelPhaseDeg2, {
        fill: RIDER2_HELMET_FILL,
        stroke: RIDER2_HELMET_STROKE,
      });
      trackEl.appendChild(trackRider2);
    }

    updateTrackRiderPosition();
  }

  function updateTrackRiderPosition() {
    if (trackRider) {
      const cx = trackXFromDist(distanceAtFrom(points, simT));
      const backward = derivativeSignedAtFrom(points, simT) < 0;
      const tr = backward
        ? "translate(" + cx + ",0) scale(-1,1) translate(" + -TRACK_RIDER_HALF_W + ",0)"
        : "translate(" + (cx - TRACK_RIDER_HALF_W) + ",0)";
      trackRider.setAttribute("transform", tr);
      syncJetPropulsion(trackRider, points);
    }
    if (dualGraph && trackRider2) {
      const cx = trackXFromDist(distanceAtFrom(points2, simT));
      const backward = derivativeSignedAtFrom(points2, simT) < 0;
      const dy = TRACK_RIDER2_DY;
      const tr = backward
        ? "translate(" + cx + "," + dy + ") scale(-1,1) translate(" + -TRACK_RIDER_HALF_W + ",0)"
        : "translate(" + (cx - TRACK_RIDER_HALF_W) + "," + dy + ")";
      trackRider2.setAttribute("transform", tr);
      syncJetPropulsion(trackRider2, points2);
    }
  }

  function clientXY(ev) {
    const touch = ev.touches && ev.touches[0];
    const changed = ev.changedTouches && ev.changedTouches[0];
    if (touch) return { clientX: touch.clientX, clientY: touch.clientY };
    if (changed) return { clientX: changed.clientX, clientY: changed.clientY };
    return { clientX: ev.clientX, clientY: ev.clientY };
  }

  /** Souřadnice v prostoru viewBox (správně i při měřítku SVG a „letterboxu“). */
  function chartCoordsFromEvent(ev) {
    const svg = chartEl;
    const { clientX, clientY } = clientXY(ev);
    const pt = svg.createSVGPoint();
    pt.x = clientX;
    pt.y = clientY;
    try {
      const ctm = svg.getScreenCTM();
      if (ctm) {
        const loc = pt.matrixTransform(ctm.inverse());
        return { x: loc.x, y: loc.y };
      }
    } catch (err) {
      /* fallback níže */
    }
    const r = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;
    const rw = r.width || 1;
    const rh = r.height || 1;
    return {
      x: (clientX - r.left) * (vb.width / rw) + vb.x,
      y: (clientY - r.top) * (vb.height / rh) + vb.y,
    };
  }

  function getActiveGraph() {
    if (!dualGraph) return 1;
    const r = document.querySelector('input[name="graphTarget"]:checked');
    return r && String(r.value) === "2" ? 2 : 1;
  }

  let dragIdx = -1;
  let dragGraph = 1;
  /** Bez pohybu nesmí mouseup překreslit graf – jinak zmizí stejný <circle> a dblclick nevznikne. */
  let dragMoved = false;
  /** Tažení počáteční rychlosti v režimu rychlost (kolečko na ose t = 0). */
  let dragVelocityOrigin = false;

  function hideChartClickPreview() {
    if (chartClickPreviewGroup) chartClickPreviewGroup.style.display = "none";
  }

  function updateChartClickPreviewFromEvent(ev) {
    if (running) {
      hideChartClickPreview();
      return;
    }
    if (dragIdx >= 0 || dragVelocityOrigin) {
      hideChartClickPreview();
      return;
    }
    const { x, y } = chartCoordsFromEvent(ev);
    const inPlot = x >= ml && x <= ml + pw && y >= mt && y <= mt + ph;
    const inAxisStrip =
      x >= ml - AXIS_PICK_W && x < ml && y >= mt && y <= mt + ph;
    if (!inPlot && !inAxisStrip) {
      hideChartClickPreview();
      return;
    }
    if (!chartClickPreviewGroup || !chartClickPreviewCircle) return;

    const g = getActiveGraph();
    const arr = g === 2 ? points2 : points;
    const v0Unset = yAxisMode === "velocity" && arr.length === 0 && velocityV0[g] == null;

    if (v0Unset && (inPlot || inAxisStrip)) {
      const ys = snapChartYToValueGrid(y);
      const vm = yToV(ys);
      chartClickPreviewCircle.setAttribute("cx", String(tToX(0)));
      chartClickPreviewCircle.setAttribute("cy", String(vToY(vm)));
      chartClickPreviewCircle.setAttribute("stroke", g === 2 ? "#2e7d32" : "#1e6bb8");
      chartClickPreviewGroup.style.display = "";
      return;
    }

    if (!inPlot) {
      hideChartClickPreview();
      return;
    }

    const snapped = snapChartXYToGrid(x, y);
    const xClamped = snapped.x;
    const t = xToT(xClamped);
    const val = yAxisMode === "velocity" ? yToV(snapped.y) : yToS(snapped.y);

    if (wouldRejectNewPoint(arr, g, t, val)) {
      hideChartClickPreview();
      return;
    }

    const fin = finalCoordsAfterHypotheticalAdd(arr, t, val);
    const cx = tToX(fin.t);
    const cy =
      yAxisMode === "velocity"
        ? vToY(fin.s)
        : sToY(fin.s);

    chartClickPreviewCircle.setAttribute("cx", String(cx));
    chartClickPreviewCircle.setAttribute("cy", String(cy));
    chartClickPreviewCircle.setAttribute("stroke", g === 2 ? "#2e7d32" : "#1e6bb8");
    chartClickPreviewGroup.style.display = "";
  }

  function pickVelocityV0FromEvent(ev) {
    if (running || yAxisMode !== "velocity") return;
    const g = getActiveGraph();
    const arr = g === 2 ? points2 : points;
    if (arr.length > 0) return;
    const { x, y } = chartCoordsFromEvent(ev);
    if (x < ml - AXIS_PICK_W || x > ml || y < mt || y > mt + ph) return;
    const ys = snapChartYToValueGrid(y);
    velocityV0[g] = yToV(ys);
    hideChartClickPreview();
    redrawChart();
  }

  function tryAddPointAtEvent(ev) {
    if (running) return;
    const { x, y } = chartCoordsFromEvent(ev);
    if (x < ml || x > ml + pw || y < mt || y > mt + ph) return;
    const snapped = snapChartXYToGrid(x, y);
    const t = xToT(snapped.x);
    const targetArr = getActiveGraph() === 2 ? points2 : points;
    const g = graphIdFromPointsArr(targetArr);

    if (yAxisMode === "velocity" && targetArr.length === 0 && velocityV0[g] == null) {
      velocityV0[g] = yToV(snapChartYToValueGrid(y));
      hideChartClickPreview();
      redrawChart();
      return;
    }

    const val =
      yAxisMode === "velocity" ? yToV(snapped.y) : yToS(snapped.y);

    if (wouldRejectNewPoint(targetArr, g, t, val)) return;

    targetArr.push({ t, s: val });
    sortPointsArr(targetArr);
    redrawChart();
  }

  /** Jen plot vrstva – žádné závislosti na pointerevents vs. mouse kompatibilitě. */
  function bindPlotHit(plotHit) {
    plotHit.addEventListener("mousedown", function (ev) {
      if (ev.button !== 0 || running) return;
      ev.preventDefault();
      tryAddPointAtEvent(ev);
    });
    plotHit.addEventListener(
      "touchstart",
      function (ev) {
        if (running) return;
        ev.preventDefault();
        tryAddPointAtEvent(ev);
      },
      { passive: false }
    );
  }

  function applyDrag(ev) {
    if (running) return;
    if (dragVelocityOrigin) {
      dragMoved = true;
      const { y } = chartCoordsFromEvent(ev);
      velocityV0[dragGraph] = Math.min(
        velocityGraphMaxMps(),
        Math.max(0, yToV(snapChartYToValueGrid(y)))
      );
      redrawChart();
      return;
    }
    if (dragIdx < 0) return;
    dragMoved = true;
    const arr = dragGraph === 2 ? points2 : points;
    const { x, y } = chartCoordsFromEvent(ev);
    let t = xToT(snapChartXToTimeGrid(x));
    const yAdj = snapChartYToValueGrid(y);

    const p = arr[dragIdx];
    if (!p) return;

    const prev =
      dragIdx === 0
        ? { t: 0, s: yAxisMode === "velocity" ? velocityV0ForGraph(dragGraph) : 0 }
        : arr[dragIdx - 1];
    const next = arr[dragIdx + 1];
    const eps = 0.03;
    if (prev) t = Math.max(prev.t + eps, t);
    if (next) t = Math.min(next.t - eps, t);

    if (yAxisMode === "velocity") {
      p.t = t;
      p.s = yToV(yAdj);
    } else {
      p.t = t;
      p.s = yToS(yAdj);
      if (yAxisMode === "cumulative") {
        const hi = next ? next.s : S_MAX;
        p.s = Math.max(prev.s, Math.min(hi, p.s));
      }
    }
    sortPointsArr(arr);
    dragIdx = arr.indexOf(p);
    redrawChart();
  }

  function endDrag() {
    dragIdx = -1;
    dragGraph = 1;
    dragVelocityOrigin = false;
    document.removeEventListener("mousemove", applyDrag);
    document.removeEventListener("mouseup", endDrag);
    document.removeEventListener("touchmove", applyDrag);
    document.removeEventListener("touchend", endDrag);
    document.removeEventListener("touchcancel", endDrag);
    if (dragMoved) redrawChart();
    dragMoved = false;
  }

  function startCircleDrag(idx, graphId, ev) {
    dragMoved = false;
    dragVelocityOrigin = false;
    dragIdx = idx;
    dragGraph = graphId;
    hideChartClickPreview();
    resetPlaybackToStartIfPaused();
    updateTrackRiderPosition();
    updateChartTimeIndicator();
    document.addEventListener("mousemove", applyDrag);
    document.addEventListener("mouseup", endDrag);
    document.addEventListener("touchmove", applyDrag, { passive: false });
    document.addEventListener("touchend", endDrag);
    document.addEventListener("touchcancel", endDrag);
  }

  function startVelocityOriginDrag(graphId, ev) {
    dragMoved = false;
    dragVelocityOrigin = true;
    dragIdx = -1;
    dragGraph = graphId;
    hideChartClickPreview();
    resetPlaybackToStartIfPaused();
    updateTrackRiderPosition();
    updateChartTimeIndicator();
    document.addEventListener("mousemove", applyDrag);
    document.addEventListener("mouseup", endDrag);
    document.addEventListener("touchmove", applyDrag, { passive: false });
    document.addEventListener("touchend", endDrag);
    document.addEventListener("touchcancel", endDrag);
  }

  function bindVelocityOriginDrag(circle, graphId) {
    circle.addEventListener("mousedown", function (ev) {
      if (running || ev.button !== 0) return;
      if (dualGraph && graphId !== getActiveGraph()) return;
      ev.stopPropagation();
      startVelocityOriginDrag(graphId, ev);
    });
    circle.addEventListener(
      "touchstart",
      function (ev) {
        if (running) return;
        if (dualGraph && graphId !== getActiveGraph()) return;
        ev.stopPropagation();
        startVelocityOriginDrag(graphId, ev);
      },
      { passive: false }
    );
  }

  function bindUserCircleDrag(circle, idx, graphId) {
    circle.addEventListener("mousedown", function (ev) {
      if (running || ev.button !== 0) return;
      if (dualGraph && graphId !== getActiveGraph()) return;
      ev.stopPropagation();
      startCircleDrag(idx, graphId, ev);
    });
    circle.addEventListener(
      "touchstart",
      function (ev) {
        if (running) return;
        if (dualGraph && graphId !== getActiveGraph()) return;
        ev.stopPropagation();
        startCircleDrag(idx, graphId, ev);
      },
      { passive: false }
    );
  }

  chartEl.addEventListener("dblclick", function (ev) {
    if (running) return;
    const target = ev.target;
    if (
      !target ||
      target.namespaceURI !== "http://www.w3.org/2000/svg" ||
      target.localName !== "circle"
    ) {
      return;
    }
    const raw =
      target.getAttribute("data-index") ||
      (target.dataset ? target.dataset.index : "");
    if (raw === undefined || raw === null || raw === "") return;
    const idx = parseInt(raw, 10);
    if (idx !== idx || idx < 0) return;
    const gRaw = target.getAttribute("data-graph") || "1";
    const graph = parseInt(gRaw, 10);
    const arr = graph === 2 ? points2 : points;
    arr.splice(idx, 1);
    if (yAxisMode === "velocity" && !arr.length) velocityV0[graph] = null;
    redrawChart();
    ev.preventDefault();
  });

  function tick(now) {
    if (!running) return;
    if (!lastFrame) lastFrame = now;
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    simT += dt;
    const endT = simEndTime();
    if (endT <= 0 || simT >= endT) {
      simT = endT;
      running = false;
      btnRun.textContent = "Spustit";
      lastFrame = 0;
    }
    timerEl.textContent = formatTimer(simT);
    if (dt > 0 && (points.length >= 1 || (dualGraph && points2.length >= 1))) {
      const tUse = Math.max(0, simT);
      const tPrev = Math.max(0, simT - dt);
      const k = (180 / Math.PI) / RIDER_WHEEL_ROLL_RADIUS;
      if (points.length >= 1) {
        trackWheelPhaseDeg1 +=
          (trackXFromDist(distanceAtFrom(points, tUse)) -
            trackXFromDist(distanceAtFrom(points, tPrev))) *
          k;
      }
      if (dualGraph && points2.length >= 1) {
        trackWheelPhaseDeg2 +=
          (trackXFromDist(distanceAtFrom(points2, tUse)) -
            trackXFromDist(distanceAtFrom(points2, tPrev))) *
          k;
      }
    }
    if (yAxisMode === "velocity") drawTrack();
    else {
      updateTrackRiderPosition();
      refreshTrackRiderWheelAngles();
      refreshTrackRiderLegPhases();
    }
    updateChartTimeIndicator();
    if (running) raf = requestAnimationFrame(tick);
  }

  btnRun.addEventListener("click", function () {
    if (running) {
      running = false;
      btnRun.textContent = "Spustit";
      cancelAnimationFrame(raf);
      lastFrame = 0;
      return;
    }
    if (points.length < 1 && !(dualGraph && points2.length >= 1)) return;
    simT = 0;
    lastFrame = 0;
    trackWheelPhaseDeg1 = 0;
    trackWheelPhaseDeg2 = 0;
    running = true;
    btnRun.textContent = "Pozastavit";
    timerEl.textContent = formatTimer(0);
    redrawChart();
    raf = requestAnimationFrame(tick);
  });

  function resetGraphDataAndPlayback() {
    running = false;
    btnRun.textContent = "Spustit";
    cancelAnimationFrame(raf);
    lastFrame = 0;
    simT = 0;
    timerEl.textContent = formatTimer(0);
    if (dragIdx >= 0 || dragVelocityOrigin) {
      document.removeEventListener("mousemove", applyDrag);
      document.removeEventListener("mouseup", endDrag);
      document.removeEventListener("touchmove", applyDrag);
      document.removeEventListener("touchend", endDrag);
      document.removeEventListener("touchcancel", endDrag);
    }
    dragIdx = -1;
    dragMoved = false;
    dragGraph = 1;
    dragVelocityOrigin = false;
    points.length = 0;
    points2.length = 0;
    velocityV0[1] = null;
    velocityV0[2] = null;
    trackWheelPhaseDeg1 = 0;
    trackWheelPhaseDeg2 = 0;
  }

  btnReset.addEventListener("click", function () {
    resetGraphDataAndPlayback();
    redrawChart();
  });

  chkDualGraph.addEventListener("change", function () {
    dualGraph = chkDualGraph.checked;
    graphTargetWrap.hidden = !dualGraph;
    if (!dualGraph) {
      const r1 = document.querySelector('input[name="graphTarget"][value="1"]');
      if (r1) r1.checked = true;
    }
    syncGraphTargetRadios();
    redrawChart();
  });

  document.querySelectorAll('input[name="graphTarget"]').forEach(function (el) {
    el.addEventListener("change", function () {
      if (dualGraph) redrawChart();
    });
  });

  document.querySelectorAll('input[name="axisY"]').forEach(function (el) {
    el.addEventListener("change", function () {
      const prev = yAxisMode;
      syncYAxisModeFromRadios();
      const next = yAxisMode;
      if (prev !== next) resetGraphDataAndPlayback();
      redrawChart();
    });
  });

  btnHelp.addEventListener("click", function () {
    helpDialog.showModal();
  });
  helpDialogClose.addEventListener("click", function () {
    helpDialog.close();
  });
  helpDialog.addEventListener("click", function (ev) {
    if (ev.target === helpDialog) helpDialog.close();
  });

  syncGraphTargetRadios();
  syncYAxisModeFromRadios();

  chartEl.addEventListener("mousemove", updateChartClickPreviewFromEvent);
  chartEl.addEventListener("mouseleave", hideChartClickPreview);
  chartEl.addEventListener("touchmove", updateChartClickPreviewFromEvent, { passive: true });

  redrawChart();
})();
  </script>
</body>
